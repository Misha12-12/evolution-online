<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Эволюция: Web Edition</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --zone-bg: #16213e;
      --card-herb: #4cc96b;
      --card-pred: #ff6b6b;
      --accent: #f0e68c;
      --text: #ffffff;
    }

    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 10px; user-select: none; }
    
    /* Верхняя панель */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px); }
    .stats-box { display: flex; gap: 20px; font-size: 18px; }
    .stat-item { display: flex; align-items: center; gap: 8px; }
    .icon { width: 24px; height: 24px; fill: currentColor; }

    h1 { text-align: center; color: var(--accent); margin-top: 0; text-shadow: 0 0 10px rgba(240, 230, 140, 0.5); }
    
    .game-area { display: flex; flex-direction: column; gap: 15px; max-width: 1400px; margin: 0 auto; }
    
    .zone-wrapper { display: flex; flex-direction: column; gap: 5px; }
    .zone-title { font-weight: bold; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }

    .zone { 
      height: 140px; background-color: var(--zone-bg); border-radius: 12px; padding: 10px; 
      overflow-x: auto; display: flex; align-items: center; flex-wrap: nowrap; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); gap: 10px;
      scrollbar-width: thin; 
    }
    .zone::-webkit-scrollbar { height: 6px; }
    .zone::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    /* Карта */
    .card {
      width: 90px;
      height: 130px;
      flex-shrink: 0;
      border-radius: 8px;
      position: relative;
      cursor: grab;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      animation: popIn 0.3s forwards;
      background: white;
      color: black;
    }
    
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card.dragging { opacity: 0.6; transform: scale(0.9); cursor: grabbing; z-index: 100; }
    .card.selected { border: 3px solid var(--accent); transform: scale(1.05) translateY(-5px); box-shadow: 0 0 20px rgba(240, 230, 140, 0.4); }
    .card:hover:not(.dragging) { transform: translateY(-5px) scale(1.02); }

    .power-badge { 
      width: 40px; height: 40px; background: #333; color: white; 
      border-radius: 50%; display: flex; align-items: center; justify-content: center; 
      font-weight: bold; font-size: 18px; margin-top: -10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    
    .type-label { font-size: 11px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-top: 4px; padding: 2px 4px; border-radius: 4px; color: white; }
    .herb-label { background: var(--card-herb); }
    .pred-label { background: var(--card-pred); }

    .hunger-bar { 
      width: 80%; height: 8px; background: #ccc; border-radius: 4px; margin-top: 5px; overflow: hidden; 
    }
    .hunger-fill { height: 100%; background: var(--card-pred); width: 100%; transition: width 0.3s; }

    button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: all 0.2s; color: white; font-weight: 600; text-transform: uppercase; }
    button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    #btnTake { background-color: var(--card-herb); } 
    #btnPlay { background-color: var(--card-pred); }  
    #btnEndTurn { background-color: #555; } 
    button:disabled { background-color: #333; cursor: not-allowed; filter: grayscale(1); }

    #log { margin-top: 20px; padding: 15px; background: #000; height: 250px; overflow-y: auto; white-space: pre-wrap; border-radius: 8px; font-family: monospace; color: #2ecc71; font-size: 14px; border-left: 4px solid var(--accent); }
    #status { font-size: 20px; text-align: center; font-weight: bold; margin-bottom: 10px; min-height: 30px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>🦎 Эволюция: Web Edition</h1>
    <div class="stats-box">
      <div class="stat-item"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5-10-5-10 5z"/></svg> Еда: <span id="food-count">0</span></div>
      <div class="stat-item"><svg class="icon" viewBox="0 0 24 24"><path d="M3 17h18v-2H3v2z"/><path d="M3 6v2h18V6H3z"/></svg> Виды: <span id="species-count">0</span></div>
    </div>
  </div>

  <p id="status">Статус: Подключение к серверу...</p>

  <div class="game-area">
    <div class="zone-wrapper">
      <div class="zone-title">Колода (Deck)</div>
      <div id="deck" class="zone"></div>
    </div>
    <div class="zone-wrapper">
      <div class="zone-title">Ваша рука (Hand)</div>
      <div id="hand" class="zone"></div>
    </div>
    <div class="zone-wrapper">
      <div class="zone-title">Игровое поле (Field)</div>
      <div id="field" class="zone" ondrop="handleDrop(event)" ondragover="allowDrop(event)"></div>
    </div>
  </div>

  <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
    <button id="btnTake" onclick="handleTakeCard()">🖐 Взять карту</button>
    <!-- Кнопка "Сыграть" теперь не нужна при Drag & Drop, но оставим для надежности -->
    <button id="btnPlay" onclick="handlePlayCard()" style="display:none;">🎮 Сыграть</button> 
    <button id="btnEndTurn" onclick="handleEndTurn()">⏳ Конец хода</button>
  </div>

  <div id="log">Лог событий...</div>

<script>
  // 1. ИСПРАВЛЕННОЕ ПОДКЛЮЧЕНИЕ (Самое важное!)
  // Мы берем адрес текущей страницы автоматически, но указываем правильный путь для Socket.IO
  const socket = io({ path: '/socket.io' });

  let myId = null;
  let gameState = {};
  let selectedCardId = null; 
  let draggedCard = null;

  // Получаем элементы DOM
  const elDeck = document.getElementById('deck');
  const elHand = document.getElementById('hand');
  const elField = document.getElementById('field');
  const elLog = document.getElementById('log');
  const elStatus = document.getElementById('status');
  const elFood = document.getElementById('food-count');
  const elSpecies = document.getElementById('species-count');

  function log(msg) {
      elLog.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n` + elLog.innerText;
  }

  // --- ГЛАВНЫЙ ОБРАБОТЧИК СОБЫТИЙ (То, чего не хватало!) ---
  
  // Когда сервер отправляет состояние игры
  socket.on('state_update', (data) => {
      console.log('✅ Получено состояние от сервера:', data);
      render(data);
      
      // Сразу меняем статус на "Подключено", если он еще висит
      if (elStatus.innerText.includes('Подключение')) {
          elStatus.innerText = "✅ Подключено к серверу";
          elStatus.style.color = "#2ecc71";
      }
  });

  // Когда заходит новый игрок (для теста)
  socket.on('player_joined', (data) => {
      log(`👤 Игрок зашел! Всего игроков: ${data.playersCount}`);
      // Тут можно добавить всплывающее окно или обновить счетчик, если нужно
  });

  // Когда игрок выходит
  socket.on('player_left', (data) => {
      log(`🚪 Игрок вышел. Осталось: ${data.playersCount}`);
  });

  // Обработка ошибок соединения
  socket.on('connect_error', (err) => {
      console.error('❌ Ошибка подключения:', err);
      elStatus.innerText = "❌ Ошибка соединения с сервером";
      elStatus.style.color = "red";
  });

  socket.on('disconnect', () => {
      elStatus.innerText = "🔴 Сервер отключился";
      elStatus.style.color = "red";
  });

  // --- ОТРИСОВКА ---
  function render(state) {
      gameState = state;
      myId = state.myId;

      // 1. Колода
      elDeck.innerHTML = '';
      state.deck.forEach(card => elDeck.appendChild(createCardElement(card, false, 'deck')));

      // 2. Рука
      elHand.innerHTML = '';
      const myHand = state.hand || []; 
      myHand.forEach(card => {
          const el = createCardElement(card, true, 'hand');
          el.addEventListener('dragstart', (e) => dragStart(e, card));
          elHand.appendChild(el);
      });

      // 3. Поле
      elField.innerHTML = '';
      state.field.forEach(item => {
          const el = createCardElement(item.card, false, 'field');
          
          if (item.playerId === myId) {
              el.style.border = '2px solid var(--accent)'; 
          } else {
              el.style.opacity = '0.6'; 
          }
          
          if (item.isDead) {
              el.style.filter = 'grayscale(1)';
              el.style.pointerEvents = 'none'; 
          }
          
          elField.appendChild(el);
      });

      updateStats(state);
      updateUI(state);
  }

  function createCardElement(card, isMyCard, zone) {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.dataset.cardId = card.id; 
      cardEl.draggable = true;
      
      let bgColor = '#fff';
      let typeClass = '';
      if (card.css === 'type-predator') { bgColor = '#ffe6e6'; typeClass = 'pred-label'; }
      else if (card.css === 'type-herbivore') { bgColor = '#e6ffe6'; typeClass = 'herb-label'; }
      
      cardEl.style.background = bgColor;

      // Защита от деления на ноль или undefined
      const hungerPercent = (card.hunger !== undefined && card.hunger > 0) ? (card.hunger / 3) * 100 : 0;

      cardEl.innerHTML = `
        <div class="power-badge">${card.power}</div>
        <div style="flex-grow:1; display:flex; align-items:center; justify-content:center;">
           <span class="type-label ${typeClass}">${card.type}</span>
        </div>
        ${card.hunger !== undefined ? `
          <div class="hunger-bar"><div class="hunger-fill" style="width: ${100 - hungerPercent}%"></div></div>
          <span style="font-size:10px; color:#666;">Голод: ${card.hunger}</span>
        ` : ''}
      `;

      cardEl.addEventListener('click', () => {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
          cardEl.classList.add('selected');
          selectedCardId = parseInt(cardEl.dataset.cardId); 
          log(`Выбрана карта ID: ${selectedCardId}`);
      });

      return cardEl;
  }

  function updateStats(state) {
      const field = state.field || [];
      const mySpecies = field.filter(f => f.playerId === myId && !f.isDead).length;
      elSpecies.innerText = mySpecies;
      elFood.innerText = 0; 
  }

  function updateUI(state) {
      const isMyTurn = (state.currentPlayer === myId);
      
      if (state.phase === 'draw') {
          if (isMyTurn) {
              elStatus.innerText = "✅ ВАШ ХОД: Возьмите карту из колоды!";
              elStatus.style.color = "#2ecc71";
          } else {
              elStatus.innerText = `⏳ Ожидание: Игрок ${state.currentPlayer?.substring(0,4) || '...'} берет карту...`;
              elStatus.style.color = "#f39c12";
          }
      } 
      else if (state.phase === 'play') {
          if (isMyTurn) {
              elStatus.innerText = "✅ ВАШ ХОД: Сыграйте карту с руки (перетащите на поле)!";
              elStatus.style.color = "#2ecc71";
          } else {
              elStatus.innerText = `⏳ Ожидание: Игрок ${state.currentPlayer?.substring(0,4) || '...'} разыгрывает карту...`;
              elStatus.style.color = "#f39c12";
          }
      } 
      else if (state.phase === 'feed') {
          elStatus.innerText = "🍖 ФАЗА КОРМЛЕНИЯ: Автоматически распределяем еду...";
          elStatus.style.color = "#e74c3c";
      }
      else if (state.phase === 'end') {
          elStatus.innerText = "🏆 Раунд завершен! Подсчет очков...";
          elStatus.style.color = "#d35400";
      }

      const btnTake = document.getElementById('btnTake');
      const btnPlay = document.getElementById('btnPlay');
      const btnEnd = document.getElementById('btnEndTurn');

      if (state.phase === 'draw') {
          btnTake.disabled = !isMyTurn;
          btnPlay.disabled = true;
          btnEnd.disabled = true;
      } 
      else if (state.phase === 'play') {
          btnTake.disabled = true;
          btnPlay.disabled = true; 
          btnEnd.disabled = true;
      } 
      else if (state.phase === 'feed' || state.phase === 'end') {
          btnTake.disabled = true;
          btnPlay.disabled = true;
          btnEnd.disabled = true;
      }
  }

  // --- ЛОГИКА ДЕЙСТВИЙ (Кнопки и Drag & Drop) ---

  function handleTakeCard() {
      if (!myId) return;
      // Берем первую карту из колоды (или любую, логика на сервере строже)
      const firstCard = document.querySelector('#deck .card');
      if (firstCard) {
          const cardId = parseInt(firstCard.dataset.cardId);
          socket.emit('take_card', cardId);
          log("Запрос: Взять карту");
      } else {
          alert("Колода пуста!");
      }
  }

  function handlePlayCard() {
      // Эта кнопка сейчас скрыта в HTML, но логика нужна если вернешь её
      if (selectedCardId) {
          socket.emit('play_card', selectedCardId);
          log("Запрос: Сыграть карту");
      }
  }

  function handleEndTurn() {
      socket.emit('end_turn');
      log("Запрос: Конец хода");
  }

  // Drag & Drop логика (упрощенная)
  function dragStart(e, card) {
      draggedCard = card;
      e.dataTransfer.setData('text/plain', card.id);
  }

  function allowDrop(e) {
      e.preventDefault();
  }

  function handleDrop(e) {
      e.preventDefault();
      if (draggedCard) {
          // Если перетащили на поле -> играем карту
          socket.emit('play_card', draggedCard.id);
          draggedCard = null;
      }
  }
</script>
