<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Эволюция: Online Beta</title>
  <!-- Подключаем библиотеку для связи с сервером -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* Вставь сюда ВСЕ свои стили из предыдущего кода (body, .card, .zone и т.д.) */
    body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 20px; }
    .game-area { display: flex; flex-direction: column; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .zone { height: 160px; border: 3px solid #ecf0f1; border-radius: 8px; padding: 10px; overflow-x: auto; display: flex; align-items: center; flex-wrap: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .card { width: 90px; height: 130px; background: linear-gradient(145deg, #3498db, #2980b9); border-radius: 12px; position: relative; cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 5px; min-width: 90px; margin-right: 10px; }
    .type-predator { background: linear-gradient(145deg, #e74c3c, #c0392b); }
    .type-herbivore { background: linear-gradient(145deg, #2ecc71, #27ae60); }
    .type-special { background: linear-gradient(145deg, #9b59b6, #8e44ad); }
    button { padding: 12px 24px; font-size: 16px; background-color: #f39c12; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    #log { margin-top: 20px; padding: 15px; background: #000; height: 200px; overflow-y: auto; white-space: pre-wrap; border-radius: 8px; font-family: monospace; color: #2ecc71; }
  </style>
</head>
<body>

  <h1>🦎 Эволюция: Онлайн версия</h1>
  <p id="status">Статус: Подключение к серверу...</p>

  <div class="game-area">
    <div><div class="zone-title">Колода</div><div id="deck" class="zone"></div></div>
    <div><div class="zone-title">Ваша рука</div><div id="hand" class="zone"></div></div>
    <div><div class="zone-title">Игровое поле</div><div id="field" class="zone"></div></div>
  </div>

  <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
    <button onclick="socket.emit('feed_phase')" id="btnFeed">🍖 Накормить всех</button>
  </div>
  
  <div id="log">Лог событий...</div>

<script>
  // 1. Подключаемся к серверу
  const socket = io();

  const elDeck = document.getElementById('deck');
  const elHand = document.getElementById('hand');
  const elField = document.getElementById('field');
  const elLog = document.getElementById('log');
  const elStatus = document.getElementById('status');

  function log(msg) {
      elLog.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n` + elLog.innerText;
  }

  // 2. Когда сервер присылает состояние игры, мы его рисуем
  socket.on('update_state', (state) => {
      render(state);
      elStatus.innerText = "Статус: Синхронизировано ✅";
  });

  socket.on('init_state', (state) => {
      log("Получено начальное состояние от сервера.");
      render(state);
      elStatus.innerText = "Статус: Игра началась ✅";
  });

  socket.on('connect', () => {
      elStatus.innerText = "Статус: Подключено к серверу ✅";
  });

  socket.on('disconnect', () => {
      elStatus.innerText = "Статус: Потеряно соединение ❌";
  });

  // Функция отрисовки (была у тебя, немного адаптирована)
  function render(state) {
      elDeck.innerHTML = '';
      elHand.innerHTML = '';
      elField.innerHTML = '';

      // Если данных еще нет (пустой объект), ничего не рисуем
      if (!state || !state.field) return;

      // В реальном проекте тут нужно создавать DOM элементы
      // Для краткости примера я просто вывожу JSON, чтобы ты видел, что сервер работает!
      // Ниже пример того, как это должно выглядеть в цикле:
      
      /* 
      state.deck.forEach(card => elDeck.appendChild(createCardElement(card, 'deck')));
      state.hand.forEach(card => elHand.appendChild(createCardElement(card, 'hand')));
      state.field.forEach(card => elField.appendChild(createCardElement(card, 'field')));
      */

      // ДЛЯ ТЕСТА: Покажем данные в логе, чтобы убедиться, что связь есть
      elLog.innerText = JSON.stringify(state, null, 2) + "\n" + elLog.innerText;
  }

  // Пример функции отправки хода (клиент -> сервер)
  function takeCard(cardId) {
      socket.emit('take_card', cardId);
  }
  
  function playCard(cardId) {
      socket.emit('play_card', cardId);
  }
</script>
</body>
</html>
